services:
  postgres:
    image: postgres:16-alpine
    container_name: gosf_prod_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gosf_net

  redis:
    image: redis:7-alpine
    container_name: gosf_prod_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gosf_net

  api:
    image: ghcr.io/${GHCR_OWNER}/gosf-api:${IMAGE_TAG:-latest}
    container_name: gosf_prod_api
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-3001}:3001"
    networks:
      - gosf_net

  web:
    image: ghcr.io/${GHCR_OWNER}/gosf-web:${IMAGE_TAG:-latest}
    container_name: gosf_prod_web
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      - gosf_net

volumes:
  postgres_prod_data:
  redis_prod_data:

networks:
  gosf_net:
    driver: bridge
